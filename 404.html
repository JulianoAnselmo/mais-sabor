<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Casa de Carnes Mais Sabor</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://www.casadecarnesmaissabor.com.br">
  <link rel="icon" type="image/png" href="/assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #D10F2C;
      --primary-dark: #7A0A1C;
      --yellow: #FFCB05;
      --black: #0F0F0F;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-family: "Plus Jakarta Sans", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 22px);
    }
    .content { position: relative; z-index: 1; }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 28px;
      background: #fff;
      border: 4px solid var(--yellow);
      border-radius: 50%;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .code {
      font-family: "Archivo Black", sans-serif;
      font-size: clamp(6rem, 18vw, 11rem);
      color: var(--yellow);
      line-height: 1;
      -webkit-text-stroke: 4px var(--black);
      text-shadow: 8px 8px 0 var(--black);
      margin-bottom: 18px;
    }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.9);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto 32px;
    }
    a.btn {
      display: inline-block;
      padding: 18px 34px;
      background: var(--yellow);
      color: var(--black);
      text-decoration: none;
      border: 3px solid var(--black);
      font-family: "Archivo Black", sans-serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: 6px 6px 0 var(--black);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a.btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 var(--black);
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="logo">
      <img src="/assets/img/logo.png" alt="Casa de Carnes Mais Sabor" onerror="this.style.display='none'">
    </div>
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>Essa página não existe ou foi movida. Que tal voltar ao início e conferir as ofertas da semana?</p>
    <a class="btn" href="/">⬅ Voltar ao início</a>
  </div>
</body>
</html>
